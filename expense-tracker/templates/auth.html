<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ExpenseIQ — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c0f;--card:#111318;--border:#1e2230;
  --green:#00e676;--red:#ff5252;--gold:#ffd740;
  --text:#f0f2f8;--muted:#6c7693;--radius:16px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
body::before{content:'';position:fixed;top:-300px;left:-300px;width:800px;height:800px;background:radial-gradient(circle,rgba(0,230,118,.05) 0%,transparent 65%);pointer-events:none;}
body::after{content:'';position:fixed;bottom:-300px;right:-300px;width:700px;height:700px;background:radial-gradient(circle,rgba(255,215,64,.04) 0%,transparent 65%);pointer-events:none;}

.container{width:100%;max-width:440px;position:relative;z-index:1;}

.brand{text-align:center;margin-bottom:40px;}
.brand-icon{font-size:40px;margin-bottom:12px;}
.brand h1{font-family:'Playfair Display',serif;font-size:32px;font-weight:800;letter-spacing:-1px;}
.brand h1 span{color:var(--green);}
.brand p{color:var(--muted);font-size:14px;margin-top:6px;}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:36px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),var(--gold));}

/* Tabs */
.tabs{display:flex;background:#0d1017;border-radius:10px;padding:4px;margin-bottom:28px;gap:4px;}
.tab{flex:1;padding:9px;text-align:center;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--muted);border:none;background:none;font-family:'DM Sans',sans-serif;}
.tab.active{background:var(--green);color:#0a0c0f;}

/* Form */
.form{display:flex;flex-direction:column;gap:16px;}
.form-section{display:none;}
.form-section.active{display:flex;flex-direction:column;gap:16px;}

.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;}
.field input{background:#0d1017;border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:12px 16px;outline:none;transition:border-color .2s,box-shadow .2s;}
.field input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,230,118,.1);}
.field input::placeholder{color:var(--muted);}

.btn-submit{background:var(--green);color:#0a0c0f;font-family:'DM Sans',sans-serif;font-weight:700;font-size:15px;padding:14px;border-radius:10px;border:none;cursor:pointer;transition:all .2s;letter-spacing:.3px;width:100%;}
.btn-submit:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;}

.error-msg{background:rgba(255,82,82,.1);border:1px solid rgba(255,82,82,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);display:none;}

.divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

.features{display:flex;justify-content:center;gap:20px;margin-top:28px;}
.feature{text-align:center;font-size:11px;color:var(--muted);}
.feature-icon{font-size:18px;margin-bottom:4px;}
</style>
</head>
<body>
<div class="container">
  <div class="brand">
    <div class="brand-icon">💰</div>
    <h1>Expense<span>IQ</span></h1>
    <p>Track smarter. Spend wiser.</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login -->
    <div class="form-section active" id="login-section">
      <div class="field">
        <label>Email</label>
        <input type="email" id="l-email" placeholder="you@email.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="l-pass" placeholder="••••••••"/>
      </div>
      <div class="error-msg" id="l-error"></div>
      <button class="btn-submit" id="l-btn" onclick="doLogin()">Login →</button>
    </div>

    <!-- Register -->
    <div class="form-section" id="register-section">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="r-name" placeholder="Arjun Sharma"/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="r-email" placeholder="you@email.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="r-pass" placeholder="Min. 6 characters"/>
      </div>
      <div class="error-msg" id="r-error"></div>
      <button class="btn-submit" id="r-btn" onclick="doRegister()">Create Account →</button>
    </div>
  </div>

  <div class="features">
    <div class="feature"><div class="feature-icon">📊</div>Charts</div>
    <div class="feature"><div class="feature-icon">🔐</div>Secure</div>
    <div class="feature"><div class="feature-icon">📤</div>CSV Export</div>
    <div class="feature"><div class="feature-icon">📅</div>Monthly</div>
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('login-section').classList.toggle('active', tab==='login');
  document.getElementById('register-section').classList.toggle('active', tab==='register');
}

async function doLogin() {
  const btn = document.getElementById('l-btn');
  const err = document.getElementById('l-error');
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Logging in…';
  try {
    const res = await fetch('/api/login', {method:'POST',headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email: document.getElementById('l-email').value, password: document.getElementById('l-pass').value})});
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error; err.style.display='block'; }
    else window.location.href = '/';
  } catch(e) { err.textContent='Network error.'; err.style.display='block'; }
  finally { btn.disabled=false; btn.textContent='Login →'; }
}

async function doRegister() {
  const btn = document.getElementById('r-btn');
  const err = document.getElementById('r-error');
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Creating account…';
  try {
    const res = await fetch('/api/register', {method:'POST',headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name: document.getElementById('r-name').value, email: document.getElementById('r-email').value, password: document.getElementById('r-pass').value})});
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error; err.style.display='block'; }
    else window.location.href = '/';
  } catch(e) { err.textContent='Network error.'; err.style.display='block'; }
  finally { btn.disabled=false; btn.textContent='Create Account →'; }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('login-section').classList.contains('active')) doLogin();
    else doRegister();
  }
});
</script>
</body>
</html>
