<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ExpenseIQ — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="/static/css/dashboard.css"/>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <span class="logo-icon">💰</span>
    <h1>Expense<span>IQ</span></h1>
  </div>
  <div class="header-center">
    <select id="month-picker" class="month-select"></select>
  </div>
  <div class="header-right">
    <span class="user-name" id="user-name">…</span>
    <a href="/api/export" class="btn btn-export">📤 CSV</a>
    <a href="/logout" class="btn btn-logout">Logout</a>
  </div>
</header>

<!-- Summary Cards -->
<div class="summary-row">
  <div class="summary-card income">
    <div class="summary-label">Total Income</div>
    <div class="summary-amount" id="total-income">₹0</div>
    <div class="summary-icon">💚</div>
  </div>
  <div class="summary-card expense">
    <div class="summary-label">Total Expenses</div>
    <div class="summary-amount" id="total-expense">₹0</div>
    <div class="summary-icon">🔴</div>
  </div>
  <div class="summary-card balance">
    <div class="summary-label">Balance</div>
    <div class="summary-amount" id="balance">₹0</div>
    <div class="summary-icon">⚖️</div>
  </div>
</div>

<!-- Main Grid -->
<main>
  <!-- Left: Add Form + Chart -->
  <div class="left-col">

    <!-- Add Expense Form -->
    <div class="panel">
      <div class="panel-header">
        <h2 id="form-title">➕ Add Transaction</h2>
        <span class="panel-tag" id="form-mode">New</span>
      </div>
      <form id="expense-form">
        <!-- Type toggle -->
        <div class="type-toggle">
          <button type="button" class="type-btn expense-btn active" onclick="setType('expense')">💸 Expense</button>
          <button type="button" class="type-btn income-btn" onclick="setType('income')">💰 Income</button>
        </div>
        <input type="hidden" id="type-val" value="expense"/>

        <div class="field-row">
          <div class="field">
            <label>Title *</label>
            <input type="text" id="f-title" placeholder="e.g. Rent, Salary…" required/>
          </div>
          <div class="field">
            <label>Amount (₹) *</label>
            <input type="number" id="f-amount" placeholder="500" min="0.01" step="0.01" required/>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Category *</label>
            <select id="f-category" required>
              <option value="">— Category —</option>
              <optgroup label="Expenses">
                <option value="Food">🍔 Food</option>
                <option value="Transport">🚌 Transport</option>
                <option value="Shopping">🛍️ Shopping</option>
                <option value="Bills">💡 Bills</option>
                <option value="Health">💊 Health</option>
                <option value="Education">📚 Education</option>
                <option value="Entertainment">🎮 Entertainment</option>
                <option value="Other">📦 Other</option>
              </optgroup>
              <optgroup label="Income">
                <option value="Salary">💼 Salary</option>
                <option value="Freelance">💻 Freelance</option>
                <option value="Gift">🎁 Gift</option>
                <option value="Investment">📈 Investment</option>
              </optgroup>
            </select>
          </div>
          <div class="field">
            <label>Date</label>
            <input type="date" id="f-date"/>
          </div>
        </div>
        <div class="field">
          <label>Note (optional)</label>
          <input type="text" id="f-note" placeholder="Any extra details…"/>
        </div>
        <input type="hidden" id="edit-id"/>
        <div class="form-error" id="form-error" style="display:none"></div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">➕ Add</button>
          <button type="button" class="btn btn-secondary" id="cancel-btn" style="display:none" onclick="cancelEdit()">Cancel</button>
        </div>
      </form>
    </div>

    <!-- Pie Chart -->
    <div class="panel chart-panel">
      <div class="panel-header">
        <h2>📊 Expenses by Category</h2>
      </div>
      <div class="chart-wrap">
        <canvas id="pie-chart"></canvas>
        <div id="chart-empty" class="chart-empty" style="display:none">No expense data this month.</div>
      </div>
    </div>
  </div>

  <!-- Right: Transactions Table -->
  <div class="right-col">
    <div class="panel">
      <div class="panel-header">
        <h2>📋 Transactions</h2>
        <span class="panel-tag" id="tx-count">0</span>
      </div>
      <div class="tx-toolbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search" placeholder="Search transactions…"/>
        </div>
        <select id="filter-type" class="filter-sel">
          <option value="">All</option>
          <option value="expense">Expenses</option>
          <option value="income">Income</option>
        </select>
        <select id="filter-cat" class="filter-sel">
          <option value="">All Categories</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Shopping">Shopping</option>
          <option value="Bills">Bills</option>
          <option value="Health">Health</option>
          <option value="Education">Education</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Salary">Salary</option>
          <option value="Freelance">Freelance</option>
          <option value="Gift">Gift</option>
          <option value="Investment">Investment</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div id="tx-loader" class="loader"><div class="spinner"></div> Loading…</div>
      <div id="tx-empty" class="tx-empty" style="display:none">
        <div style="font-size:40px;opacity:.3">📭</div>
        <p>No transactions found.</p>
      </div>
      <div id="tx-list" style="display:none"></div>
    </div>
  </div>
</main>

<!-- Toast -->
<div id="toast"></div>

<script src="/static/js/dashboard.js"></script>
</body>
</html>
